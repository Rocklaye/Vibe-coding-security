{% extends 'base.html' %}
{% block title %}Modifier le profil — Microblog{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">

    <div class="auth-head">
      <span class="avatar avatar-xl">{{ user.username[0].upper() }}</span>
      <h1 class="auth-title" style="margin-top:.75rem">Modifier le profil</h1>
    </div>

    <form action="{{ url_for('edit_profile') }}" method="POST" class="auth-form">
      <div class="field">
        <label class="field-label">Nom d'utilisateur</label>
        <input type="text" class="field-input field-disabled" value="{{ user.username }}" disabled>
        <span class="field-hint">Le nom d'utilisateur ne peut pas être modifié.</span>
      </div>

      <div class="field">
        <label for="bio" class="field-label">
          Bio <span class="field-label-opt">(facultatif)</span>
        </label>
        <textarea
          id="bio" name="bio"
          class="compose-area"
          placeholder="Parlez-nous de vous en quelques mots…"
          maxlength="160"
          rows="3"
          id="bio-textarea"
        >{{ user.bio }}</textarea>
        <div class="field-counter-row">
          <span class="char-counter" id="bio-counter">
            <span class="count">{{ 160 - (user.bio | length) }}</span> restants
          </span>
        </div>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('profile', username=user.username) }}" class="btn btn-ghost">Annuler</a>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
    </form>

  </div>
</div>
{% endblock %}
