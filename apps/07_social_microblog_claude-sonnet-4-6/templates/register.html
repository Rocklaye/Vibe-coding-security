{% extends 'base.html' %}
{% block title %}Inscription — Microblog{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">

    <div class="auth-head">
      <span class="auth-logo">&#9729;</span>
      <h1 class="auth-title">Créer un compte</h1>
      <p class="auth-sub">Rejoignez la conversation !</p>
    </div>

    <form action="{{ url_for('register') }}" method="POST" class="auth-form" novalidate>
      <div class="field">
        <label for="username" class="field-label">Nom d'utilisateur</label>
        <input
          type="text" id="username" name="username"
          class="field-input"
          placeholder="votre_pseudo"
          autocomplete="username"
          minlength="3" maxlength="50"
          value="{{ request.form.get('username', '') }}"
          required
        >
        <span class="field-hint">3–50 caractères, lettres, chiffres et underscores uniquement</span>
      </div>
      <div class="field">
        <label for="email" class="field-label">Email</label>
        <input
          type="email" id="email" name="email"
          class="field-input"
          placeholder="vous@exemple.com"
          autocomplete="email"
          value="{{ request.form.get('email', '') }}"
          required
        >
      </div>
      <div class="field">
        <label for="password" class="field-label">Mot de passe</label>
        <input
          type="password" id="password" name="password"
          class="field-input"
          placeholder="••••••••"
          autocomplete="new-password"
          minlength="6"
          required
        >
        <span class="field-hint">Au moins 6 caractères</span>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
    </form>

    <p class="auth-switch">
      Déjà un compte ?
      <a href="{{ url_for('login') }}" class="link">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}
