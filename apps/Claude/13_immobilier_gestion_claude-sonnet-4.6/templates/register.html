<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — GestImmo</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box" style="max-width:500px">
    <span class="auth-logo">&#127968;</span>
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Rejoignez GestImmo</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ 'error' if cat=='error' else 'success' }}" style="margin-bottom:1rem">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-grid" style="gap:.85rem;margin-bottom:.85rem">
        <div class="field">
          <label class="field-label">Prénom et nom *</label>
          <input type="text" name="full_name" class="field-input"
                 value="{{ request.form.get('full_name','') }}" placeholder="Jean Dupont" required>
        </div>
        <div class="field">
          <label class="field-label">Nom d'utilisateur *</label>
          <input type="text" name="username" class="field-input"
                 value="{{ request.form.get('username','') }}" placeholder="jean_d" required>
        </div>
        <div class="field">
          <label class="field-label">Email *</label>
          <input type="email" name="email" class="field-input"
                 value="{{ request.form.get('email','') }}" placeholder="jean@exemple.fr" required>
        </div>
        <div class="field">
          <label class="field-label">Mot de passe *</label>
          <input type="password" name="password" class="field-input"
                 placeholder="••••••••" minlength="6" required autocomplete="new-password">
        </div>
        <div class="field full">
          <label class="field-label">Je suis *</label>
          <select name="role" class="field-select">
            <option value="owner"  {% if request.form.get('role')!='tenant' %}selected{% endif %}>Propriétaire / Bailleur</option>
            <option value="tenant" {% if request.form.get('role')=='tenant' %}selected{% endif %}>Locataire</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Créer mon compte</button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--text-muted)">
      Déjà inscrit ? <a href="{{ url_for('login') }}">Se connecter</a>
    </p>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
