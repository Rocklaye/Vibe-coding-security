{% extends "base.html" %}

{% block title %}Inscription - StreamDivert{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Inscription</h2>
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="name">Nom complet</label>
            <input type="text" id="name" name="name" class="form-control" required 
                   placeholder="Votre nom">
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" required 
                   placeholder="votre@email.com">
        </div>
        
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" class="form-control" required 
                   placeholder="Minimum 8 caractères" minlength="8">
        </div>
        
        <button type="submit" class="btn btn-primary">S'inscrire</button>
    </form>
    
    <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">
        Déjà un compte ? 
        <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Connectez-vous</a>
    </p>
</div>
{% endblock %}
