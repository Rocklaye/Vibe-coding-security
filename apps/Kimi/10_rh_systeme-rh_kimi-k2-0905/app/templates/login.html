{% extends "base.html" %}

{% block title %}Connexion - HR Manager{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-users-cog"></i>
            </div>
            <h1>HR Manager</h1>
            <p>Gestion des Ressources Humaines</p>
        </div>
        
        <form class="login-form" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" required 
                           placeholder="Entrez votre nom d'utilisateur" autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" required 
                           placeholder="Entrez votre mot de passe">
                    <button type="button" class="toggle-password" onclick="togglePassword(this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Se connecter
            </button>
        </form>
        
        <div class="login-footer">
            <p>Comptes de démonstration :</p>
            <div class="demo-accounts">
                <div class="demo-account">
                    <span class="badge badge-admin">admin</span>
                    <code>admin / admin123</code>
                </div>
                <div class="demo-account">
                    <span class="badge badge-hr">RH</span>
                    <code>rh / rh123</code>
                </div>
                <div class="demo-account">
                    <span class="badge badge-manager">Manager</span>
                    <code>manager / manager123</code>
                </div>
                <div class="demo-account">
                    <span class="badge badge-employee">Employé</span>
                    <code>employe / employe123</code>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
