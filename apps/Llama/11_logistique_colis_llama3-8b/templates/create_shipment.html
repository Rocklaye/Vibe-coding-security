<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un colis</title>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">Accueil</a> |
        <a href="{{ url_for('create_shipment') }}">Créer un colis</a>
    </nav>

    <h1>Créer un colis</h1>

    <form method="post">
        {{ form.hidden_tag() }}

        <p>
            {{ form.tracking_number.label }}<br>
            {{ form.tracking_number(size=30) }}<br>
            {% for error in form.tracking_number.errors %}
                <span style="color:red">{{ error }}</span>
            {% endfor %}
        </p>

        <p>
            {{ form.username.label }}<br>
            {{ form.username(size=30) }}
        </p>

        <p>{{ form.submit() }}</p>
    </form>
</body>
</html>
