{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Connexion / Inscription</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Nom d'utilisateur</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="role" class="form-label">Je suis un :</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="student">Étudiant</option>
                            <option value="teacher">Enseignant</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrer dans l'application</button>
                    <p class="text-muted text-center mt-3 small">Si le compte n'existe pas, il sera créé automatiquement.</p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
